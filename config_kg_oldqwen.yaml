# =============================================================================
# Food KG — Old Qwen2.5-32B Settings (full context, no DFlash optimization)
# =============================================================================
# Same food DB and KG as DFlash, but with original query settings
# that were used with Qwen2.5-32B-Instruct.
# =============================================================================

cosmos:
  uri: "https://divdet-provisioned.documents.azure.com:443/"
  key: ""
  database_name: "food"
  use_rbac_auth: true
  tenant_id: "43083d15-7273-40c1-b7db-39efd9ccc17a"
  cosmos_account_name: "divdet-provisioned"
  cosmos_resource_group: "ams-cosmos-db"
  azure_subscription_id: "b7d41fc8-d35d-41db-92ed-1f7f1d32d4d9"

  sources:
    - id: "food"
      container_name: "food"
      partition_key_path: "/country_code"
      embedding_field: "e"
      text_fields:
        - product_title
        - product_title_translated
        - brand
        - claims
        - claims_translated
        - ingredients
        - ingredients_translated
        - allergens
        - allergens_translated
        - pack_size

kg:
  triples_container: "triples"
  entities_container: "entities"
  partition_key_path: "/s"

embedding:
  dimensions: 1024
  in_process_model: "Qwen/Qwen3-Embedding-0.6B"

llm:
  endpoint: "http://localhost:8000/v1"
  model: "Qwen/Qwen3.5-27B"
  api_key: "dummy"
  temperature: 0.0
  max_tokens: 2048
  max_retries: 3

query:
  seed_entities_k: 20
  max_hops: 2
  max_triples: 150
  max_source_chunks: 40
  vector_augment_k: 15
  max_answer_tokens: 2048

paths:
  questions_file: "data/food.json"
  output_root: "out_kg_oldqwen"

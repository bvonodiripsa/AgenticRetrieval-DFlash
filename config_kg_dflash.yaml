# =============================================================================
# Food-DFlash Knowledge Graph Configuration
# =============================================================================
# Isolated copy of the food KG pipeline scoped to 10 benchmark questions.
# Uses a separate Cosmos DB database "food-dflash" so the main "food" DB is
# untouched.  KG containers live inside this database.
# =============================================================================

cosmos:
  uri: "https://divdet.documents.azure.com:443/"
  key: ""
  database_name: "food-dflash"
  use_rbac_auth: true
  tenant_id: "43083d15-7273-40c1-b7db-39efd9ccc17a"
  cosmos_account_name: "divdet"
  cosmos_resource_group: "ams-cosmos-db"
  azure_subscription_id: "b7d41fc8-d35d-41db-92ed-1f7f1d32d4d9"

  # Source food-product container (populated by setup_food_dflash.py)
  sources:
    - id: "food"
      container_name: "food"
      partition_key_path: "/country_code"
      embedding_field: "e"
      text_fields:
        - product_title
        - product_title_translated
        - brand
        - claims
        - claims_translated
        - ingredients
        - ingredients_translated
        - allergens
        - allergens_translated
        - pack_size

# Source database to copy documents FROM (used by setup_food_dflash.py)
source_cosmos:
  uri: "https://divdet.documents.azure.com:443/"
  database_name: "food"
  use_rbac_auth: true
  tenant_id: "43083d15-7273-40c1-b7db-39efd9ccc17a"

kg:
  triples_container: "kg_triples"
  entities_container: "kg_entities"
  partition_key_path: "/pk"

embedding:
  dimensions: 1024
  in_process_model: "Qwen/Qwen3-Embedding-0.6B"

llm:
  endpoint: "http://localhost:8000/v1"
  model: "Qwen/Qwen3.5-27B"
  api_key: "dummy"
  temperature: 0.0
  max_tokens: 2048
  max_retries: 3
  dflash:
    draft_model: "z-lab/Qwen3.5-27B-DFlash"
    num_speculative_tokens: 15

build:
  extraction_rounds: 1
  max_gaps_per_round: 3
  concurrency: 20
  entity_merge_threshold: 0.85
  min_confidence: 0.5

query:
  seed_entities_k: 20
  max_hops: 2
  max_triples: 150
  max_source_chunks: 40
  vector_augment_k: 15
  max_answer_tokens: 1024

paths:
  questions_file: "data/food.json"
  output_root: "out_kg_dflash"

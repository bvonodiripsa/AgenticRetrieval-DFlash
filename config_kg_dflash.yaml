# =============================================================================
# Food-DFlash Knowledge Graph Configuration
# =============================================================================
# Uses the existing "food" Cosmos DB database with its full KG (892K triples,
# 1.5K entities). DFlash (Qwen3.5-27B + speculative decoding) accelerates
# the online query path — no need for a separate database.
# =============================================================================

cosmos:
  uri: "https://divdet.documents.azure.com:443/"
  key: ""
  database_name: "food"
  use_rbac_auth: true
  tenant_id: "43083d15-7273-40c1-b7db-39efd9ccc17a"
  cosmos_account_name: "divdet"
  cosmos_resource_group: "ams-cosmos-db"
  azure_subscription_id: "b7d41fc8-d35d-41db-92ed-1f7f1d32d4d9"

  sources:
    - id: "food"
      container_name: "food"
      partition_key_path: "/country_code"
      embedding_field: "e"
      text_fields:
        - product_title
        - product_title_translated
        - brand
        - claims
        - claims_translated
        - ingredients
        - ingredients_translated
        - allergens
        - allergens_translated
        - pack_size

kg:
  triples_container: "kg_triples_food"
  entities_container: "kg_entities_food"
  partition_key_path: "/pk"

embedding:
  dimensions: 1024
  in_process_model: "Qwen/Qwen3-Embedding-0.6B"

llm:
  endpoint: "http://localhost:8000/v1"
  model: "Qwen/Qwen3.5-27B"
  api_key: "dummy"
  temperature: 0.0
  max_tokens: 2048
  max_retries: 3
  dflash:
    draft_model: "z-lab/Qwen3.5-27B-DFlash"
    num_speculative_tokens: 15

build:
  extraction_rounds: 1
  max_gaps_per_round: 3
  concurrency: 20
  entity_merge_threshold: 0.85
  min_confidence: 0.5

query:
  seed_entities_k: 20
  max_hops: 2
  max_triples: 80
  max_source_chunks: 20
  vector_augment_k: 10
  max_answer_tokens: 420

paths:
  questions_file: "data/food.json"
  output_root: "out_kg_dflash"

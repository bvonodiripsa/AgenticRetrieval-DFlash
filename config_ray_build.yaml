# =============================================================================
# Food KG Build — Ray Cluster (20x H100 workers)
# =============================================================================

cosmos:
  uri: "https://divdet.documents.azure.com:443/"
  key: ""
  database_name: "food"
  use_rbac_auth: true
  tenant_id: "43083d15-7273-40c1-b7db-39efd9ccc17a"

  sources:
    - id: "food"
      container_name: "food"
      partition_key_path: "/country_code"
      embedding_field: "e"
      text_fields:
        - product_title
        - product_title_translated
        - brand
        - claims
        - claims_translated
        - ingredients
        - ingredients_translated
        - allergens
        - allergens_translated
        - pack_size

kg:
  triples_container: "kg_triples_food"
  entities_container: "kg_entities_food"
  partition_key_path: "/pk"

embedding:
  dimensions: 1024
  in_process_model: "Qwen/Qwen3-Embedding-0.6B"

# LLM for post-processing (API mode on head node — calls our H100 vLLM)
llm:
  endpoint: "http://10.0.0.4:8000/v1"
  model: "Qwen/Qwen2.5-32B-Instruct"
  api_key: "dummy"
  temperature: 0.0
  max_tokens: 2048
  max_retries: 3

# Ray vLLM build — each worker loads model directly on GPU
build_llm:
  backend: "ray_vllm"
  model: "Qwen/Qwen2.5-32B-Instruct"
  max_tokens: 3000
  max_model_len: 16384

build:
  extraction_rounds: 1
  max_gaps_per_round: 3
  concurrency: 20
  entity_merge_threshold: 0.85
  min_confidence: 0.5

query:
  seed_entities_k: 20
  max_hops: 2
  max_triples: 150
  max_source_chunks: 40
  vector_augment_k: 15
  max_answer_tokens: 1024

paths:
  questions_file: "data/food.json"
  output_root: "out_kg"
  checkpoint_dir: "out_kg/ray_build"
